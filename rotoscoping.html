<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotoscoping | Opiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img class="brand-logo" src="assets/amogiLogo.svg" alt="Opiz logo">
      <span class="brand-text">Opiz</span>
    </div>
    <nav class="site-nav">
      <a href="index.html">Homepage</a>
      <a class="active" href="rotoscoping.html">Rotoscoping</a>
      <a href="solar-system.html">Solar System</a>
    </nav>
  </header>

  <main>
    <section class="panel rotoscoping-panel">
      <h2>Rotoscoping Progress Viewer</h2>

      <div class="featured-video">
        <h3>Reference Video</h3>
        <div class="video-frame large">
          <iframe
            src="https://www.youtube.com/embed/fIsi2uSqZQY?autoplay=1&mute=1&loop=1&playlist=fIsi2uSqZQY"
            title="Main Rotoscoping Video"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
          </iframe>
        </div>
      </div>

      <div class="weekly-progress">
        <h3>Weekly Progress (Week 1 to Week 12)</h3>
        <div class="week-grid">
          <article class="week-card">
            <h4>Week 1 Background Lyrics Progress</h4>
            <div class="video-frame">
              <iframe src="https://www.youtube.com/embed/vixV4_BnZFU?autoplay=1&mute=1&loop=1&playlist=vixV4_BnZFU" title="Week 1" loading="lazy" allowfullscreen></iframe>
            </div>
          </article>
          <article class="week-card">
            <h4>Week 2 Background Lyrics Progress</h4>
            <div class="video-frame">
              <iframe src="https://www.youtube.com/embed/FHkEldL73EA?autoplay=1&mute=1&loop=1&playlist=FHkEldL73EA" title="Week 2" loading="lazy" allowfullscreen></iframe>
            </div>
          </article>
          <article class="week-card">
            <h4>Week 3 Progress</h4>
            <div class="video-frame">
              <iframe src="https://www.youtube.com/embed/sNlluhJawVo?autoplay=1&mute=1&loop=1&playlist=sNlluhJawVo" title="Week 3" loading="lazy" allowfullscreen></iframe>
            </div>
          </article>
          <article class="week-card">
            <h4>Week 4 Progress</h4>
            <div class="video-frame">
              <iframe src="https://www.youtube.com/embed/9VQi6sizvrE?autoplay=1&mute=1&loop=1&playlist=9VQi6sizvrE" title="Week 4" loading="lazy" allowfullscreen></iframe>
            </div>
          </article>
          <!-- Repeat same pattern for Weeks 5–12 -->
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>For academic purpose only</p>
  </footer>
</body>
</html>
